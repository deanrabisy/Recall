<style>
:root{--primary:#4a90e2;--danger:#e74c3c;--chance:#f1c40f;--bg:#f5f6fa;--text:#2c3e50;--shadow:0 4px 12px #0002}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif}button{border:0;border-radius:8px;cursor:pointer;font:inherit;transition:transform .2s,opacity .2s}button:hover:not(:disabled){transform:scale(1.05)}button:disabled{cursor:not-allowed}.game-container{width:100%;max-width:1800px;padding:16px;text-align:center}.game-board{position:relative;min-height:520px;padding:16px 32px 32px;border-radius:16px;background:#fff;box-shadow:var(--shadow)}.reset-round{position:absolute;top:16px;right:16px;width:40px;height:40px;padding:8px;background:transparent}.reset-round svg{width:24px;height:24px;fill:var(--primary)}.reset-round:hover{transform:rotate(180deg)}.players-container{display:flex;justify-content:space-between;gap:24px;padding:0 clamp(8px,8vw,128px);margin-bottom:8px}.player-card{min-width:200px;padding:16px 24px;border-radius:8px;transition:transform .3s,box-shadow .3s}.player-card.active{box-shadow:0 0 15px #4a90e280;transform:translateY(-2px)}.player-name{margin-bottom:8px;padding:8px;border-radius:4px;font-size:19px;font-weight:700}.player-card.active .player-name{background:var(--primary);color:#fff}.player-name:focus,.player-score span:focus,.sentence-starter h2:focus{outline:2px solid var(--primary);background:#4a90e214}.player-score span{display:inline-block;min-width:32px;padding:4px;border-radius:4px;cursor:text}.second-chance-counter{display:flex;justify-content:center;margin-top:8px}.second-chance-icons{display:flex;gap:5px}.second-chance-icon{width:12px;height:12px;border-radius:50%;background:var(--chance);opacity:.3}.second-chance-icon.active{opacity:1}.use-chance-btn{width:80%;min-height:35px;margin-top:8px;padding:8px 20px;background:var(--chance);color:#000;opacity:.35}.use-chance-btn.active{background:#f39c12;opacity:1}.reveal-btn-container{position:relative;z-index:1;display:flex;justify-content:center;margin:-16px 0 8px;padding-top:40px}.legend-btn{position:absolute;top:-8px;left:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;padding:0;border-radius:50%;background:#34495e;color:#fff;font-size:19px;font-weight:700;transform:translateX(-50%)}.legend-btn:hover{transform:translateX(-50%) scale(1.1)}.reveal-btn{padding:16px 32px;background:#c4456d;color:#fff;font-size:19px}.game-area{margin:0 0 16px;padding:8px 16px;border-radius:8px;background:#fff;box-shadow:0 2px 4px #0002}.sentence-starter{max-width:1200px;margin:0 auto 16px}.sentence-starter h2{margin:0;padding:8px;border-radius:8px;font-size:29px}.deck-area{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;align-items:center;min-height:300px;margin:16px auto}.deck,#cardDisplay,.drawn-card{width:200px;height:300px}.deck{position:relative;grid-column:2;justify-self:center;cursor:pointer;perspective:1000px;transition:transform .2s}.deck:before,.deck:after{content:"";position:absolute;inset:0;z-index:-1;background-image:var(--deck-back);background-position:center;background-repeat:no-repeat;background-size:contain}.deck:before{top:3px;left:3px;filter:brightness(.95);transform:rotate(-2deg)}.deck:after{top:1.5px;left:1.5px;filter:brightness(.97);transform:rotate(-1deg)}.deck img,.drawn-card img,.sequence-card img,.legend-image{width:100%;height:100%;object-fit:contain}#cardDisplay{grid-column:3;justify-self:center;perspective:1000px}.drawn-card{display:flex;align-items:center;justify-content:center;opacity:0;will-change:transform,opacity}.drawn-card.animating{animation:drawCard .8s cubic-bezier(.4,0,.2,1) forwards;transform-origin:left center}@keyframes drawCard{0%{opacity:0;transform:translateX(-200px) rotateY(90deg)}to{opacity:1;transform:translateX(0) rotateY(0)}}.sequence-display{display:none;margin-top:32px;padding:16px;border-radius:8px;background:#fffffff5;box-shadow:0 2px 4px #0002}.sequence-display.active{display:block}.sequence-cards{display:flex;flex-wrap:wrap;gap:16px;align-items:center;justify-content:center}.sequence-card{width:100px;height:150px;margin:5px;transition:transform .3s}.sequence-card:hover{transform:scale(1.1)}.hide-sequence-btn{margin-bottom:16px;padding:8px 16px;background:var(--danger);color:#fff}.legend-overlay{position:fixed;inset:0;z-index:1000;display:none;align-items:center;justify-content:center;background:#000c;cursor:pointer}.legend-overlay.active{display:flex}.legend-image{width:auto;max-width:90%;max-height:90vh}.game-message{position:fixed;top:50%;left:50%;z-index:1001;max-width:80%;padding:24px 40px;border:2px solid var(--primary);border-radius:8px;background:#fff;box-shadow:var(--shadow);font-size:19px;transform:translate(-50%,-50%);animation:fadeInOut 3s forwards}.game-message.success{border-color:#2ecc71;background:#2ecc71;color:#fff}.game-message.error{border-color:var(--danger);background:var(--danger);color:#fff}.game-message.persistent{animation:none}@keyframes fadeInOut{0%{opacity:0}20%,80%{opacity:1}to{opacity:0}}.loading-screen{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#ffffffe6}.loading-spinner{width:50px;height:50px;border:5px solid var(--bg);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite}.loading-text{margin-top:16px;font-size:19px}@keyframes spin{to{transform:rotate(360deg)}}.modal{position:fixed;inset:0;z-index:1002;display:flex;align-items:center;justify-content:center;background:#0008;opacity:1;pointer-events:auto}.modal.hidden{opacity:0;pointer-events:none}.modal-content{padding:32px;border-radius:16px;background:#fff}.modal-content button{padding:12px 24px;background:var(--primary);color:#fff}@media(max-width:780px){body{align-items:flex-start}.game-board{padding:56px 12px 20px}.players-container{flex-direction:column;align-items:stretch;padding:0}.player-card{min-width:0}.deck-area{grid-template-columns:1fr 1fr}.empty-column{display:none}.deck{grid-column:1}#cardDisplay{grid-column:2}.deck,#cardDisplay,.drawn-card{width:min(42vw,160px);height:min(63vw,240px)}}

<body>
<div class="game-container"><div class="game-board"><button class="reset-round" title="Reset round" aria-label="Reset round"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"></path></svg></button><div class="players-container"><div class="player-card" id="player1Card"><div class="player-name" contenteditable="true">Player 1</div><div class="player-score">Score: <span contenteditable="true">0</span></div><div class="second-chance-counter"><div class="second-chance-icons" aria-label="Player 1 second chances"><span class="second-chance-icon"></span><span class="second-chance-icon"></span><span class="second-chance-icon"></span><span class="second-chance-icon"></span><span class="second-chance-icon"></span><span class="second-chance-icon"></span></div></div><button class="use-chance-btn" disabled>Use!</button></div><div class="player-card" id="player2Card"><div class="player-name" contenteditable="true">Player 2</div><div class="player-score">Score: <span contenteditable="true">0</span></div><div class="second-chance-counter"><div class="second-chance-icons" aria-label="Player 2 second chances"><span class="second-chance-icon"></span><span class="second-chance-icon"></span><span class="second-chance-icon"></span><span class="second-chance-icon"></span><span class="second-chance-icon"></span><span class="second-chance-icon"></span></div></div><button class="use-chance-btn" disabled>Use!</button></div></div><div class="reveal-btn-container"><button class="legend-btn" title="Show legend" aria-label="Show legend">?</button><button class="reveal-btn">Reveal!</button></div><div class="legend-overlay" aria-hidden="true"><img id="legendImage" src="" alt="Game Legend" class="legend-image"></div><div class="game-area"><div class="sentence-starter"><h2 contenteditable="true">I can't count...</h2></div><div class="deck-area"><div class="empty-column"></div><div class="deck" role="button" tabindex="0" aria-label="Draw a card"><img id="deckBackImage" src="" alt="Card Back"></div><div id="cardDisplay" aria-live="polite"></div><div class="empty-column"></div></div></div></div><div id="gameOverModal" class="modal hidden"><div class="modal-content"><h2>Game Over!</h2><p>Winner: <span id="winnerName"></span></p><p>Final Score: <span id="finalScore">0</span></p><button id="restartBtn">Play Again</button></div></div></div>
<script>
const IMAGE_URLS={"2nd chance - 1.png":"https://i.ibb.co/wN6ntb5w/2nd-chance-1.png","2nd chance - 2.png":"https://i.ibb.co/8gW1gJSm/2nd-chance-2.png","2nd chance - 3.png":"https://i.ibb.co/MDz2KKGh/2nd-chance-3.png","2nd chance - 4.png":"https://i.ibb.co/hx2Xc2ps/2nd-chance-4.png","2nd chance - 5.png":"https://i.ibb.co/yFC3Qkjc/2nd-chance-5.png","2nd chance - 6.png":"https://i.ibb.co/7d76Jh3f/2nd-chance-6.png","deck back.png":"https://i.ibb.co/ynBkZt6z/deck-back.png","legendl.png":"https://i.ibb.co/353xcgzt/legendl.png","ncn - basil.png":"https://i.ibb.co/nqnvYVxV/ncn-basil.png","ncn - beer.png":"https://i.ibb.co/TDpH1f3r/ncn-beer.png","ncn - bread.png":"https://i.ibb.co/Xxvj9FZS/ncn-bread.png","ncn - butter.png":"https://i.ibb.co/FkjGx56z/ncn-butter.png","ncn - cereal.png":"https://i.ibb.co/rG6cTwQ3/ncn-cereal.png","ncn - cheese.png":"https://i.ibb.co/PG6G1QmR/ncn-cheese.png","ncn - coffee.png":"https://i.ibb.co/nNz8MBpx/ncn-coffee.png","ncn - flour.png":"https://i.ibb.co/VcCnTPcN/ncn-flour.png","ncn - garlic.png":"https://i.ibb.co/rK9kBTky/ncn-garlic.png","ncn - honey.png":"https://i.ibb.co/qYKGNPcv/ncn-honey.png","ncn - ice.png":"https://i.ibb.co/4wwxLfqp/ncn-ice.png","ncn - juice.png":"https://i.ibb.co/9mBdLj2R/ncn-juice.png","ncn - ketchup.png":"https://i.ibb.co/mV0hb6GL/ncn-ketchup.png","ncn - mayonnaise.png":"https://i.ibb.co/5W17zZQC/ncn-mayonnaise.png","ncn - meat.png":"https://i.ibb.co/N27bGCjg/ncn-meat.png","ncn - milk.png":"https://i.ibb.co/PsxmFJ2z/ncn-milk.png","ncn - mustard.png":"https://i.ibb.co/35r9bgKs/ncn-mustard.png","ncn - oil.png":"https://i.ibb.co/B2BjxKvm/ncn-oil.png","ncn - pasta.png":"https://i.ibb.co/XxZ5MZgs/ncn-pasta.png","ncn - pepper.png":"https://i.ibb.co/Y76M3DNm/ncn-pepper.png","ncn - porridge.png":"https://i.ibb.co/DPwtWxYy/ncn-porridge.png","ncn - rice.png":"https://i.ibb.co/60RKYkZ7/ncn-rice.png","ncn - salt.png":"https://i.ibb.co/JWNmdrg4/ncn-salt.png","ncn - sauce.png":"https://i.ibb.co/yr0xFyR/ncn-sauce.png","ncn - soup.png":"https://i.ibb.co/RTQbMrfg/ncn-soup.png","ncn - soy.png":"https://i.ibb.co/whzrnvkc/ncn-soy.png","ncn - spaghetti.png":"https://i.ibb.co/tP36X5wv/ncn-spaghetti.png","ncn - spinach.png":"https://i.ibb.co/9kkrDNfX/ncn-spinach.png","ncn - sugar.png":"https://i.ibb.co/YB4cCFjw/ncn-sugar.png","ncn - tea.png":"https://i.ibb.co/jvjCJtCx/ncn-tea.png","ncn - tofu.png":"https://i.ibb.co/p6NNKJ0b/ncn-tofu.png","ncn - water.png":"https://i.ibb.co/n8w6KVfy/ncn-water.png","ncn - wine.png":"https://i.ibb.co/tMSTNf7L/ncn-wine.png"};
const asset=f=>IMAGE_URLS[f],nounFiles=["ncn - basil.png","ncn - beer.png","ncn - bread.png","ncn - butter.png","ncn - cheese.png","ncn - cereal.png","ncn - coffee.png","ncn - flour.png","ncn - ketchup.png","ncn - garlic.png","ncn - honey.png","ncn - ice.png","ncn - juice.png","ncn - mayonnaise.png","ncn - meat.png","ncn - mustard.png","ncn - milk.png","ncn - oil.png","ncn - pepper.png","ncn - pasta.png","ncn - porridge.png","ncn - salt.png","ncn - rice.png","ncn - soup.png","ncn - sauce.png","ncn - soy.png","ncn - spinach.png","ncn - spaghetti.png","ncn - sugar.png","ncn - tofu.png","ncn - tea.png","ncn - wine.png","ncn - water.png"],chanceFiles=["2nd chance - 1.png","2nd chance - 2.png","2nd chance - 3.png","2nd chance - 4.png","2nd chance - 5.png","2nd chance - 6.png"],deckBack=asset("deck back.png"),legendImage=asset("legendl.png");
class Card{constructor(type,imagePath,value){this.type=type;this.imagePath=imagePath;this.value=value;this.label=this.getLabelFromPath(imagePath);this.revealed=false;this.assigned=false;this.used=false}getLabelFromPath(path){const filename=decodeURIComponent(path.split("/").pop()||""),name=filename.replace(/\.[^.]+$/,'');if(name.startsWith("ncn - "))return name.replace("ncn - ","");if(name.startsWith("ncn-"))return name.replace("ncn-","");if(name.startsWith("2nd chance")||name.startsWith("2nd-chance"))return"Second Chance";return name}}class Player{constructor(name){this.name=name;this.score=0;this.secondChanceCards=[]}}class DeckManager{constructor(){this.deck=[];this.drawnCards=new Set}reset(){this.deck=[];this.drawnCards.clear()}createNounCards(paths){this.deck.push(...paths.map(path=>new Card("noun",path,Math.random()*100)))}createChanceCards(paths){this.deck.push(...paths.map(path=>new Card("chance",path,0)))}shuffleDeck(){for(let i=this.deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[this.deck[i],this.deck[j]]=[this.deck[j],this.deck[i]]}}drawCard(){if(!this.deck.length)return null;let card;do{card=this.deck.pop();if(!card)return null}while(this.drawnCards.has(card.imagePath)&&this.deck.length>0);if(this.drawnCards.has(card.imagePath))return null;this.drawnCards.add(card.imagePath);return card}}class MessageManager{showMessage(text,type="success",persistent=false){document.querySelectorAll(".game-message.persistent").forEach(m=>m.remove());const m=document.createElement("div");m.className=`game-message ${type}${persistent?" persistent":""}`;m.textContent=text;document.querySelector(".game-board").appendChild(m);if(!persistent)setTimeout(()=>m.remove(),2000)}}class GameUI{constructor(game){this.game=game}setupEventListeners(game){document.getElementById("restartBtn").addEventListener("click",()=>game.restart());document.querySelectorAll(".player-score span").forEach((el,i)=>el.addEventListener("blur",()=>{const score=parseInt(el.textContent,10)||0;el.textContent=score;game.players[i].score=score}));document.querySelectorAll(".player-name").forEach((el,i)=>el.addEventListener("blur",()=>{game.players[i].name=el.textContent.trim()||`Player ${i+1}`;this.updatePlayerDisplay(game.players,game.currentPlayerIndex)}));document.querySelector(".reveal-btn").addEventListener("click",()=>game.showSequence())}setupDeckInteraction(game){const deck=document.querySelector(".deck"),draw=()=>{if(!game.roundActive){game.endRound();return}deck.style.transform="translateY(-5px)";setTimeout(()=>deck.style.transform="translateY(0)",200);game.drawNewCard()};deck.addEventListener("click",draw);deck.addEventListener("keydown",e=>{if(e.key==="Enter")draw()})}setupResetButton(game){document.querySelector(".reset-round").addEventListener("click",()=>{if(confirm("Are you sure you want to reset the current round?")){game.endRound();game.showMessage("Round reset!","success")}})}setupUseChanceButtons(game){document.querySelectorAll(".use-chance-btn").forEach((button,i)=>button.addEventListener("click",()=>{game.showSequence(true);game.useSecondChance(i)}))}setupLegendButton(){const btn=document.querySelector(".legend-btn"),overlay=document.querySelector(".legend-overlay");btn.addEventListener("click",e=>{e.stopPropagation();overlay.classList.add("active");overlay.setAttribute("aria-hidden","false")});overlay.addEventListener("click",()=>{overlay.classList.remove("active");overlay.setAttribute("aria-hidden","true")})}setupSpacebarListener(game){document.addEventListener("focusin",e=>{if(e.target.hasAttribute("contenteditable"))game.isEditing=true});document.addEventListener("focusout",e=>{if(e.target.hasAttribute("contenteditable"))game.isEditing=false});document.addEventListener("keydown",e=>{if(e.code==="Space"&&!game.isEditing){e.preventDefault();if(!game.roundActive){game.endRound();return}game.deckElement.style.transform="translateY(-5px)";setTimeout(()=>game.deckElement.style.transform="translateY(0)",200);game.drawNewCard()}})}displayDrawnCard(card){const area=document.getElementById("cardDisplay");area.innerHTML="";const div=document.createElement("div"),img=document.createElement("img");div.className="drawn-card";img.src=card.imagePath;img.alt=card.label;img.style.opacity="0";div.appendChild(img);area.appendChild(div);void div.offsetWidth;requestAnimationFrame(()=>{img.style.transition="opacity .4s ease-in";img.style.opacity="1";div.classList.add("animating")})}updateSequenceDisplay(sequence){let seq=document.querySelector(".sequence-display");if(!seq){seq=document.createElement("div");seq.className="sequence-display";document.querySelector(".game-board").appendChild(seq)}seq.innerHTML=`<button class="hide-sequence-btn">Hide</button><div class="sequence-cards">${sequence.map(card=>`<div class="sequence-card"><img src="${card.imagePath}" alt="${card.label}"></div>`).join("")}</div>`;seq.querySelector(".hide-sequence-btn").addEventListener("click",()=>seq.classList.remove("active"))}updatePlayerDisplay(players,current){players.forEach((p,i)=>{const card=document.getElementById(`player${i+1}Card`);card.querySelector(".player-name").textContent=p.name;card.querySelector(".player-score span").textContent=p.score;card.classList.toggle("active",current===i)})}updateCardDisplay(){document.getElementById("cardDisplay").innerHTML=""}updateSecondChanceDisplay(i){const icons=document.getElementById(`player${i+1}Card`).querySelectorAll(".second-chance-icon"),player=this.game.players[i];icons.forEach((icon,n)=>icon.classList.toggle("active",n<player.secondChanceCards.length))}updateUseChanceButton(i){const button=document.getElementById(`player${i+1}Card`).querySelector(".use-chance-btn"),has=this.game.players[i].secondChanceCards.length>0;button.classList.toggle("active",has);button.disabled=!has}}
class Game{constructor(){this.playedCards=[];this.roundSequence=[];this.isEditing=false;this.players=[new Player("Player 1"),new Player("Player 2")];this.currentPlayerIndex=0;this.currentCard=null;this.nextCard=null;this.roundActive=true;this.secondChanceUsed=false;this.deckElement=document.querySelector(".deck");this.ui=new GameUI(this);this.deckManager=new DeckManager;this.messageManager=new MessageManager;this.applyAssetPaths();this.preloadImages().finally(()=>{this.setupCards();this.initializeEventHandlers();this.initializeGame()})}applyAssetPaths(){document.documentElement.style.setProperty("--deck-back",`url("${deckBack}")`);document.getElementById("deckBackImage").src=deckBack;document.getElementById("legendImage").src=legendImage}initializeEventHandlers(){this.ui.setupEventListeners(this);this.ui.setupDeckInteraction(this);this.ui.setupResetButton(this);this.ui.setupUseChanceButtons(this);this.ui.setupLegendButton();this.ui.setupSpacebarListener(this)}initializeGame(){this.ui.updatePlayerDisplay(this.players,this.currentPlayerIndex);this.ui.updateSequenceDisplay(this.roundSequence)}setupCards(){this.deckManager.reset();this.deckManager.createNounCards(nounFiles.map(asset));this.deckManager.createChanceCards(chanceFiles.map(asset));this.deckManager.shuffleDeck()}async preloadImages(){const loading=document.createElement("div");loading.className="loading-screen";loading.innerHTML='<div class="loading-spinner"></div><div class="loading-text">Loading...</div>';document.body.appendChild(loading);const paths=[deckBack,legendImage,...nounFiles.map(asset),...chanceFiles.map(asset)];await Promise.allSettled(paths.map(path=>new Promise(resolve=>{const img=new Image,timeout=setTimeout(resolve,8000);img.onload=()=>{clearTimeout(timeout);resolve()};img.onerror=()=>{clearTimeout(timeout);resolve()};img.src=path})));loading.remove()}drawNewCard(){if(!this.roundActive){this.endRound();return}this.currentCard=this.nextCard||this.deckManager.drawCard();if(!this.currentCard){this.messageManager.showMessage("You've reached the bottom! Now, work your way back up. Good luck :)","success",true);this.roundActive=false;return}this.ui.displayDrawnCard(this.currentCard);if(this.currentCard.type==="noun")this.roundSequence.push({imagePath:this.currentCard.imagePath,label:this.currentCard.label,type:this.currentCard.type});this.ui.updateSequenceDisplay(this.roundSequence);this.nextCard=this.deckManager.drawCard();if(this.currentCard.type==="chance")setTimeout(()=>this.assignSecondChanceCard(),500);else{this.currentPlayerIndex=(this.currentPlayerIndex+1)%this.players.length;this.ui.updatePlayerDisplay(this.players,this.currentPlayerIndex)}}assignSecondChanceCard(){const card=this.currentCard;card.assigned=true;card.used=true;this.secondChanceUsed=true;this.players[this.currentPlayerIndex].secondChanceCards.push(card);this.messageManager.showMessage(`${this.players[this.currentPlayerIndex].name} got a Second Chance card!`,"success");this.ui.updateSecondChanceDisplay(this.currentPlayerIndex);this.ui.updateUseChanceButton(this.currentPlayerIndex)}endRound(){document.querySelectorAll(".game-message.persistent").forEach(m=>m.remove());this.playedCards=[];this.roundSequence=[];this.currentCard=null;this.nextCard=null;this.secondChanceUsed=false;this.roundActive=true;this.currentPlayerIndex=0;this.players.forEach((p,i)=>{p.secondChanceCards=[];this.ui.updateSecondChanceDisplay(i);this.ui.updateUseChanceButton(i)});this.setupCards();this.ui.updateCardDisplay();this.ui.updateSequenceDisplay(this.roundSequence);this.ui.updatePlayerDisplay(this.players,this.currentPlayerIndex);document.querySelector(".sequence-display").classList.remove("active")}useSecondChance(i){if(!this.players[i].secondChanceCards.length)return;this.players[i].secondChanceCards.pop();this.messageManager.showMessage(`${this.players[i].name} used a Second Chance!`,"success");this.ui.updateSecondChanceDisplay(i);this.ui.updateUseChanceButton(i)}showSequence(forceOpen=false){const seq=document.querySelector(".sequence-display");seq.classList.toggle("active",forceOpen||!seq.classList.contains("active"))}showMessage(text,type,persistent=false){this.messageManager.showMessage(text,type,persistent)}restart(){document.getElementById("gameOverModal").classList.add("hidden");this.players=[new Player("Player 1"),new Player("Player 2")];this.endRound()}resolveChallenge(challengeCorrect){const challenger=this.players[(this.currentPlayerIndex+1)%2],challenged=this.players[this.currentPlayerIndex];if(challengeCorrect){challenger.score++;this.messageManager.showMessage(`${challenger.name} wins the challenge!`,"success")}else{challenged.score++;this.messageManager.showMessage(`${challenged.name} successfully defends!`,"success")}this.ui.updatePlayerDisplay(this.players,this.currentPlayerIndex);this.endRound()}}
window.addEventListener("DOMContentLoaded",()=>{window.recallGame=new Game});
</script>
