<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Re-Call</title>
  <style>
    :root {
      --primary: #23879f;
      --secondary: #16b7a7;
      --cyan: #50d3df;
      --chance: #e4e09a;
      --surface: #ffffff;
      --surface-soft: #dafbe9;
      --background: #eff8d7;
      --text: #004870;
      --danger: #23879f;
      --shadow: 0 18px 45px rgba(0, 72, 112, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top left, rgba(80, 211, 223, 0.28), transparent 32rem),
        linear-gradient(135deg, #eff8d7 0%, #dafbe9 52%, #bdf6e0 100%);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    button {
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      font: inherit;
      transition: transform 0.2s ease, opacity 0.2s ease, background-color 0.2s ease;
    }

    button:hover:not(:disabled) {
      transform: scale(1.05);
    }

    button:disabled {
      cursor: not-allowed;
    }

    .game-container {
      width: 100%;
      max-width: 1800px;
      padding: 12px;
      text-align: center;
    }

    .game-board {
      position: relative;
      width: 100%;
      min-height: 520px;
      padding: 22px 32px 28px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(35, 135, 159, 0.16);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .brand-logo {
      position: absolute;
      top: 10px;
      left: 12px;
      z-index: 2;
      width: clamp(82px, 10.2vw, 128px);
      height: auto;
      object-fit: contain;
    }

    .reset-round {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 40px;
      height: 40px;
      padding: 8px;
      background: transparent;
    }

    .reset-round svg {
      width: 24px;
      height: 24px;
      fill: var(--text);
    }

    .reset-round:hover {
      transform: rotate(180deg);
    }

    .players-container {
      position: relative;
      display: flex;
      justify-content: space-between;
      gap: 20px;
      padding: 0 clamp(8px, 8vw, 128px);
      margin-bottom: 4px;
    }

    .turn-beam {
      position: absolute;
      z-index: 0;
      border-radius: 12px;
      pointer-events: none;
      opacity: 0;
      background:
        radial-gradient(ellipse at center, rgba(228, 224, 154, 0.5), rgba(80, 211, 223, 0.2) 48%, transparent 72%);
      filter: blur(1px);
      transform: scaleX(0.62);
      transition:
        left 0.58s cubic-bezier(0.22, 0.92, 0.26, 1),
        top 0.58s cubic-bezier(0.22, 0.92, 0.26, 1),
        width 0.58s cubic-bezier(0.22, 0.92, 0.26, 1),
        height 0.58s cubic-bezier(0.22, 0.92, 0.26, 1),
        opacity 0.22s ease,
        transform 0.58s cubic-bezier(0.22, 0.92, 0.26, 1);
    }

    .turn-beam.ready {
      opacity: 1;
      transform: scaleX(1);
    }

    .turn-beam.moving {
      transform: scaleX(0.42) scaleY(0.92);
      opacity: 0.88;
    }

    .player-card {
      position: relative;
      z-index: 1;
      min-width: 200px;
      padding: 16px 24px;
      border-radius: 8px;
      background: rgba(189, 246, 224, 0.32);
      border: 1px solid rgba(22, 183, 167, 0.16);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .player-card.active {
      animation: activeTurnFlash 1.35s ease-in-out infinite;
      box-shadow: 0 0 0 2px rgba(80, 211, 223, 0.42), 0 14px 30px rgba(0, 72, 112, 0.12);
      transform: translateY(-2px);
    }

    .player-card.active::after {
      content: "TURN";
      position: absolute;
      top: -10px;
      right: 12px;
      padding: 3px 9px;
      border-radius: 999px;
      background: var(--chance);
      color: var(--text);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      box-shadow: 0 0 18px rgba(228, 224, 154, 0.7);
    }

    @keyframes activeTurnFlash {
      0%, 100% {
        box-shadow: 0 0 0 2px rgba(80, 211, 223, 0.38), 0 14px 30px rgba(0, 72, 112, 0.12);
      }
      50% {
        box-shadow:
          0 0 0 3px rgba(228, 224, 154, 0.72),
          0 0 28px rgba(80, 211, 223, 0.45),
          0 14px 30px rgba(0, 72, 112, 0.12);
      }
    }

    .player-name {
      margin-bottom: 8px;
      padding: 8px;
      border-radius: 4px;
      font-size: 19px;
      font-weight: 700;
    }

    .player-card.active .player-name {
      background: linear-gradient(135deg, #23879f, #16b7a7);
      color: white;
    }

    .player-name:focus,
    .player-score span:focus,
    .sentence-starter h2:focus {
      outline: 2px solid var(--primary);
      background: rgba(74, 144, 226, 0.08);
    }

    .player-score span {
      display: inline-block;
      min-width: 32px;
      padding: 4px;
      border-radius: 4px;
      cursor: text;
    }

    .second-chance-counter {
      display: flex;
      justify-content: center;
      margin-top: 8px;
    }

    .second-chance-icons {
      display: flex;
      gap: 5px;
    }

    .second-chance-icon {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--chance);
      box-shadow: 0 0 0 rgba(228, 224, 154, 0);
      opacity: 0.36;
    }

    .second-chance-icon.active {
      opacity: 1;
      animation: chanceIndicatorPulse 2.4s ease-in-out infinite;
      box-shadow: 0 0 12px rgba(228, 224, 154, 0.82);
    }

    .second-chance-icon.receiving {
      opacity: 0;
    }

    @keyframes chanceIndicatorPulse {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 0 9px rgba(228, 224, 154, 0.7);
      }
      50% {
        transform: scale(1.28);
        box-shadow:
          0 0 0 5px rgba(228, 224, 154, 0.2),
          0 0 18px rgba(80, 211, 223, 0.55);
      }
    }

    .use-chance-btn {
      width: 80%;
      min-height: 35px;
      margin-top: 8px;
      padding: 8px 20px;
      background: var(--chance);
      color: var(--text);
      opacity: 0.35;
    }

    .use-chance-btn.active {
      background: linear-gradient(135deg, #e4e09a, #b2ecd1);
      opacity: 1;
    }

    .reveal-btn-container {
      position: absolute;
      top: 22px;
      left: 50%;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 7px;
      margin: 0;
      padding: 0;
      transform: translateX(-50%);
    }

    .legend-btn {
      position: relative;
      width: 86px;
      min-height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 6px 11px;
      border-radius: 6px 8px 8px 6px;
      background:
        linear-gradient(115deg, rgba(255, 255, 255, 0.95), rgba(239, 248, 215, 0.9)),
        #eff8d7;
      color: var(--text);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.02em;
      box-shadow: 0 8px 20px rgba(0, 72, 112, 0.14), inset -8px 0 18px rgba(228, 224, 154, 0.22);
      transform: none;
      transform-origin: 50% 80%;
    }

    .legend-btn::before {
      content: "";
      width: 14px;
      height: 18px;
      border-radius: 2px;
      background:
        linear-gradient(135deg, transparent 0 23%, rgba(80, 211, 223, 0.55) 24% 34%, transparent 35%),
        linear-gradient(180deg, #ffffff, #e4e09a);
      border: 1px solid rgba(0, 72, 112, 0.2);
      box-shadow: 2px 1px 0 rgba(0, 72, 112, 0.08);
    }

    .legend-btn::after {
      content: "";
      position: absolute;
      inset: -7px;
      border-radius: 12px;
      background: radial-gradient(circle, rgba(228, 224, 154, 0.36), transparent 68%);
      opacity: 0;
      z-index: -1;
      transition: opacity 0.25s ease;
    }

    .legend-btn:hover {
      background:
        linear-gradient(115deg, #ffffff, #eff8d7),
        #eff8d7;
      transform: translateY(-1px);
    }

    .legend-btn:hover::after,
    .legend-btn:focus-visible::after {
      opacity: 1;
    }

    .reveal-btn {
      min-width: 104px;
      padding: 12px 22px;
      background: linear-gradient(135deg, #004870, #23879f);
      color: white;
      font-size: 17px;
    }

    .message-zone {
      position: absolute;
      top: 122px;
      left: 50%;
      z-index: 4;
      width: min(460px, 72vw);
      min-height: 48px;
      pointer-events: none;
      transform: translateX(-50%);
    }

    .game-area {
      margin: 0;
      padding: 8px 16px;
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(196, 247, 229, 0.42));
      border: 1px solid rgba(35, 135, 159, 0.12);
      box-shadow: 0 10px 26px rgba(0, 72, 112, 0.08);
    }

    .sentence-starter {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: -4px auto 22px;
      text-align: center;
    }

    .sentence-starter h2 {
      margin: 0;
      padding: 8px;
      border-radius: 8px;
      font-size: clamp(22px, 2.1vw, 29px);
      color: var(--text);
    }

    .deck-area {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      align-items: center;
      width: 100%;
      min-height: clamp(240px, 37vh, 300px);
      margin: 10px auto;
    }

    .deck,
    #cardDisplay,
    .drawn-card {
      width: clamp(150px, 12vw, 200px);
      height: clamp(225px, 18vw, 300px);
    }

    .deck {
      position: relative;
      grid-column: 2;
      justify-self: center;
      cursor: pointer;
      perspective: 1000px;
      transition: filter 0.2s ease, transform 0.2s ease;
    }

    .deck::before,
    .deck::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background-image: var(--deck-back);
      background-position: center;
      background-repeat: no-repeat;
      background-size: contain;
      transition: transform 0.22s ease, filter 0.22s ease;
    }

    .deck::before {
      top: 5px;
      left: 5px;
      filter: brightness(0.95);
      transform: rotate(-3deg);
    }

    .deck::after {
      top: 2.5px;
      left: 2.5px;
      filter: brightness(0.97);
      transform: rotate(-1.5deg);
    }

    .deck:hover,
    .deck:focus-visible {
      filter: drop-shadow(0 18px 24px rgba(0, 72, 112, 0.18));
      transform: translateY(-7px) rotate(-1.5deg);
    }

    .deck:hover::before,
    .deck:focus-visible::before {
      transform: translate(7px, 5px) rotate(-7deg);
    }

    .deck:hover::after,
    .deck:focus-visible::after {
      transform: translate(4px, 2px) rotate(5deg);
    }

    .deck:hover img,
    .deck:focus-visible img {
      filter: brightness(1.04) saturate(1.06);
    }

    .deck.drawing {
      transform: translateY(-5px) rotate(-1deg);
    }

    .deck img,
    .drawn-card img,
    .sequence-card img,
    .legend-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .memory-strip {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      gap: 0;
      min-height: 96px;
      max-width: 820px;
      margin: 4px 0 0 auto;
      padding-right: clamp(8px, 7vw, 96px);
      pointer-events: auto;
    }

    .memory-card {
      width: 60px;
      height: 90px;
      margin-left: -11px;
      border-radius: 7px;
      background-image: var(--deck-back);
      background-position: center;
      background-repeat: no-repeat;
      background-size: contain;
      image-rendering: auto;
      filter: contrast(1.08) saturate(1.08) drop-shadow(0 8px 10px rgba(0, 72, 112, 0.12));
      transform: rotate(calc((var(--i) - 4) * 1.6deg));
      transition: filter 0.22s ease, transform 0.22s ease;
    }

    .memory-card:hover {
      filter: contrast(1.1) saturate(1.1) drop-shadow(0 12px 14px rgba(0, 72, 112, 0.2));
      transform: translateY(-7px) rotate(calc((var(--i) - 4) * 1.6deg));
      z-index: 2;
    }

    .memory-card.receiving {
      opacity: 0;
    }

    .memory-floater {
      position: fixed;
      z-index: 1004;
      pointer-events: none;
      perspective: 900px;
      filter: drop-shadow(0 18px 22px rgba(0, 72, 112, 0.24));
    }

    .memory-floater-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
    }

    .memory-floater-face {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border-radius: 7px;
      object-fit: contain;
      image-rendering: auto;
      backface-visibility: hidden;
    }

    .memory-floater-back {
      transform: rotateY(180deg);
    }

    #cardDisplay {
      grid-column: 3;
      justify-self: center;
      perspective: 1000px;
      transform-style: preserve-3d;
    }

    .drawn-card {
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform-style: preserve-3d;
      will-change: transform, opacity;
    }

    .drawn-card.animating {
      animation: drawCard 0.55s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      transform-origin: left center;
    }

    .floating-chance-card {
      position: fixed;
      z-index: 1003;
      pointer-events: none;
      transform-origin: center;
      object-fit: contain;
      border-radius: 8px;
      filter:
        drop-shadow(0 0 18px rgba(228, 224, 154, 0.9))
        drop-shadow(0 14px 22px rgba(0, 72, 112, 0.24));
    }

    .player-card.receiving-chance .second-chance-icons {
      filter: drop-shadow(0 0 14px rgba(228, 224, 154, 0.5));
    }

    @keyframes drawCard {
      0% {
        opacity: 0;
        transform: translateX(-200px) rotateY(90deg);
      }
      100% {
        opacity: 1;
        transform: translateX(0) rotateY(0deg);
      }
    }

    .sequence-display {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: clamp(16px, 4vw, 48px);
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(3px);
    }

    .sequence-display.active {
      display: flex;
    }

    .sequence-panel {
      width: min(1120px, 94vw);
      max-height: 84vh;
      overflow: auto;
      padding: clamp(16px, 3vw, 28px);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(80, 211, 223, 0.28);
      box-shadow: 0 24px 70px rgba(0, 72, 112, 0.2);
    }

    .sequence-cards {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
      justify-content: center;
    }

    .sequence-card {
      width: 100px;
      height: 150px;
      margin: 5px;
      transition: transform 0.3s ease;
      transform-style: preserve-3d;
    }

    .sequence-card:hover {
      transform: scale(1.1);
    }

    .hide-sequence-btn {
      margin-bottom: 16px;
      padding: 8px 16px;
      background: var(--danger);
      color: white;
    }

    .sequence-display.active .sequence-card.reveal-card img {
      animation: revealCardFlip 0.7s ease both;
      animation-delay: var(--delay, 0s);
      backface-visibility: hidden;
    }

    @keyframes revealCardFlip {
      0% {
        opacity: 0;
        transform: translateY(22px) scale(0.78) rotateY(88deg);
      }
      60% {
        opacity: 1;
        transform: translateY(-4px) scale(1.04) rotateY(-8deg);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1) rotateY(0deg);
      }
    }

    .legend-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(4px);
      cursor: pointer;
    }

    .legend-overlay.active {
      display: flex;
    }

    .legend-image {
      width: auto;
      max-width: 90%;
      max-height: 90vh;
      filter: drop-shadow(0 24px 42px rgba(0, 72, 112, 0.28));
    }

    .legend-overlay.active .legend-image {
      animation: legendPaperBristle 3.2s ease-in-out infinite;
      transform-origin: 50% 12%;
    }

    @keyframes legendPaperBristle {
      0%, 100% { transform: rotate(0deg) translateY(0); }
      18% { transform: rotate(-0.7deg) translateY(-1px); }
      36% { transform: rotate(0.55deg) translateY(0); }
      54% { transform: rotate(-0.35deg) translateY(-1px); }
      72% { transform: rotate(0.25deg) translateY(0); }
    }

    .game-message {
      width: 100%;
      padding: 12px 18px;
      border: 1px solid rgba(80, 211, 223, 0.38);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 14px 32px rgba(0, 72, 112, 0.16);
      color: var(--text);
      font-size: 16px;
      font-weight: 700;
      text-align: center;
      animation: fadeInOut 3s ease-in-out forwards;
      backdrop-filter: blur(8px);
    }

    .game-message.success {
      border-color: #16b7a7;
      background: linear-gradient(135deg, #23879f, #16b7a7);
      color: white;
    }

    .game-message.error {
      border-color: var(--danger);
      background: var(--danger);
      color: white;
    }

    .game-message.persistent {
      animation: none;
    }

    @keyframes fadeInOut {
      0% { opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 1; }
      100% { opacity: 0; }
    }

    .loading-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.9);
    }

    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 5px solid var(--background);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .loading-text {
      margin-top: 16px;
      font-size: 19px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 1002;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.5);
      opacity: 1;
      pointer-events: auto;
      transition: opacity 0.3s ease;
    }

    .modal.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .modal-content {
      padding: 32px;
      border-radius: 16px;
      background: white;
      text-align: center;
    }

    .modal-content button {
      padding: 12px 24px;
      background: linear-gradient(135deg, #23879f, #16b7a7);
      color: white;
    }

    @media (max-width: 780px) {
      body {
        align-items: flex-start;
      }

      .game-board {
        padding: 72px 12px 20px;
      }

      .brand-logo {
        width: 95px;
      }

      .players-container {
        flex-direction: column;
        align-items: stretch;
        padding: 0;
      }

      .player-card {
        min-width: 0;
      }

      .deck-area {
        grid-template-columns: 1fr 1fr;
        min-height: 240px;
      }

      .empty-column {
        display: none;
      }

      .deck {
        grid-column: 1;
      }

      #cardDisplay {
        grid-column: 2;
      }

      .deck,
      #cardDisplay,
      .drawn-card {
        width: min(42vw, 160px);
        height: min(63vw, 240px);
      }

      .sequence-panel {
        max-height: 88vh;
      }

      .sequence-card {
        width: min(24vw, 92px);
        height: min(36vw, 138px);
      }

      .reveal-btn-container {
        top: 18px;
      }

      .message-zone {
        top: 116px;
        width: min(420px, 86vw);
      }

      .memory-strip {
        justify-content: center;
        padding-right: 0;
      }
    }
  </style>
</head>
<body>
  <div class="game-container">
    <div class="game-board">
      <img class="brand-logo" src="https://i.ibb.co/C3KcP9cZ/Adaptivelogotrans.png" alt="Adaptive">
      <button class="reset-round" title="Reset round" aria-label="Reset round">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"></path>
        </svg>
      </button>

      <div class="players-container">
        <div class="turn-beam" aria-hidden="true"></div>
        <div class="player-card" id="player1Card">
          <div class="player-name" contenteditable="true">Player 1</div>
          <div class="player-score">Score: <span contenteditable="true">0</span></div>
          <div class="second-chance-counter">
            <div class="second-chance-icons" aria-label="Player 1 second chances">
              <span class="second-chance-icon"></span>
              <span class="second-chance-icon"></span>
              <span class="second-chance-icon"></span>
              <span class="second-chance-icon"></span>
              <span class="second-chance-icon"></span>
              <span class="second-chance-icon"></span>
            </div>
          </div>

    class Card {
      constructor(type, imagePath, value) {
        this.type = type;
        this.imagePath = imagePath;
        this.value = value;
        this.label = this.getLabelFromPath(imagePath);
        this.revealed = false;
        this.assigned = false;
        this.used = false;
      }

      getLabelFromPath(path) {
        const filename = decodeURIComponent(path.split("/").pop() || "");
        const nameWithoutExt = filename.replace(/\.[^.]+$/, "");
        if (nameWithoutExt.startsWith("ncn - ")) {
          return nameWithoutExt.replace("ncn - ", "");
        }
        if (nameWithoutExt.startsWith("ncn-")) {
          return nameWithoutExt.replace("ncn-", "");
        }
        if (nameWithoutExt.startsWith("2nd chance") || nameWithoutExt.startsWith("2nd-chance")) {
          return "Second Chance";
        }
        return nameWithoutExt;
      }
    }

    class Player {
      constructor(name) {
        this.name = name;
        this.score = 0;
        this.secondChanceCards = [];
      }
    }

    class DeckManager {
      constructor() {
        this.deck = [];
        this.drawnCards = new Set();
      }

      reset() {
        this.deck = [];
        this.drawnCards.clear();
      }

      createNounCards(paths) {
        this.deck.push(...paths.map((path) => new Card("noun", path, Math.random() * 100)));
      }

      createChanceCards(paths) {
        this.deck.push(...paths.map((path) => new Card("chance", path, 0)));
      }

      shuffleDeck() {
        for (let i = this.deck.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          [this.deck[i], this.deck[j]] = [this.deck[j], this.deck[i]];
        }
      }

      drawCard() {
        if (!this.deck.length) {
          return null;
        }

        let card;
        do {
          card = this.deck.pop();
          if (!card) {
            return null;
          }
        } while (this.drawnCards.has(card.imagePath) && this.deck.length > 0);

        if (this.drawnCards.has(card.imagePath)) {
          return null;
        }

        this.drawnCards.add(card.imagePath);
        return card;
      }
    }

    class MessageManager {
      showMessage(text, type = "success", persistent = false) {
        document.querySelectorAll(".game-message.persistent").forEach((message) => message.remove());
        if (!persistent) {
          document.querySelectorAll(".message-zone .game-message").forEach((message) => message.remove());
        }

        const message = document.createElement("div");
        message.className = `game-message ${type}${persistent ? " persistent" : ""}`;
        message.textContent = text;

        const messageZone = document.querySelector(".message-zone");
        (messageZone || document.querySelector(".game-board")).appendChild(message);

        if (!persistent) {
          setTimeout(() => {
            message.remove();
          }, 2000);
        }
      }
    }

    class GameUI {
      constructor(game) {
        this.game = game;
      }

      setupEventListeners(game) {
        document.getElementById("restartBtn").addEventListener("click", () => game.restart());

        document.querySelectorAll(".player-score span").forEach((element, index) => {
          element.addEventListener("blur", () => {
            const score = Number.parseInt(element.textContent, 10) || 0;
            element.textContent = score;
            game.players[index].score = score;
          });
        });

        document.querySelectorAll(".player-name").forEach((element, index) => {
          element.addEventListener("blur", () => {
            game.players[index].name = element.textContent.trim() || `Player ${index + 1}`;
            this.updatePlayerDisplay(game.players, game.currentPlayerIndex);
          });
        });

        document.querySelector(".reveal-btn").addEventListener("click", () => {
          game.showSequence();
        });
      }

      setupDeckInteraction(game) {
        const deck = document.querySelector(".deck");
        const draw = () => {
          if (!game.roundActive) {
            game.endRound();
            return;
          }

          deck.classList.add("drawing");
          setTimeout(() => {
            deck.classList.remove("drawing");
          }, 200);

          game.drawNewCard();
        };

        deck.addEventListener("click", draw);
        deck.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            draw();
          }
        });
      }

      setupResetButton(game) {
        document.querySelector(".reset-round").addEventListener("click", () => {
          if (confirm("Are you sure you want to reset the current round?")) {
            game.endRound();
            game.showMessage("Round reset!", "success");
          }
        });
      }

      setupUseChanceButtons(game) {
        document.querySelectorAll(".use-chance-btn").forEach((button, index) => {
          button.addEventListener("click", () => {
            game.showSequence(true);
            game.useSecondChance(index);
          });
        });
      }

      setupLegendButton() {
        const legendBtn = document.querySelector(".legend-btn");
        const legendOverlay = document.querySelector(".legend-overlay");

        legendBtn.addEventListener("click", (event) => {
          event.stopPropagation();
          legendOverlay.classList.add("active");
          legendOverlay.setAttribute("aria-hidden", "false");
        });

        legendOverlay.addEventListener("click", () => {
          legendOverlay.classList.remove("active");
          legendOverlay.setAttribute("aria-hidden", "true");
        });
      }

      setupSpacebarListener(game) {
        document.addEventListener("focusin", (event) => {
          if (event.target.hasAttribute("contenteditable")) {
            game.isEditing = true;
          }
        });

        document.addEventListener("focusout", (event) => {
          if (event.target.hasAttribute("contenteditable")) {
            game.isEditing = false;
          }
        });

        document.addEventListener("keydown", (event) => {
          if (event.code === "Space" && !game.isEditing) {
            event.preventDefault();
            if (!game.roundActive) {
              game.endRound();
              return;
            }
            game.deckElement.classList.add("drawing");
            setTimeout(() => {
              game.deckElement.classList.remove("drawing");
            }, 200);
            game.drawNewCard();
          }
        });
      }

      displayDrawnCard(card) {
        const cardDisplayArea = document.getElementById("cardDisplay");
        cardDisplayArea.innerHTML = "";

        const drawnCard = document.createElement("div");
        drawnCard.className = "drawn-card";

        const cardImg = document.createElement("img");
        cardImg.src = card.imagePath;
        cardImg.alt = card.label;
        cardImg.style.opacity = "0";

        drawnCard.appendChild(cardImg);
        cardDisplayArea.appendChild(drawnCard);
        void drawnCard.offsetWidth;

        requestAnimationFrame(() => {
          cardImg.style.transition = "opacity 0.4s ease-in";
          cardImg.style.opacity = "1";
          drawnCard.classList.add("animating");
        });
      }

      animateSecondChanceAbsorb(playerIndex) {
        const drawnCard = document.querySelector("#cardDisplay .drawn-card");
        const sourceImg = drawnCard?.querySelector("img");
        const playerCard = document.getElementById(`player${playerIndex + 1}Card`);
        const player = this.game.players[playerIndex];
        const targetIndex = Math.max(0, player.secondChanceCards.length - 1);
        const target = playerCard?.querySelectorAll(".second-chance-icon")[targetIndex];

        if (!drawnCard || !sourceImg || !target) {
          return Promise.resolve();
        }

        return new Promise((resolve) => {
          const sourceRect = sourceImg.getBoundingClientRect();
          const targetRect = target.getBoundingClientRect();
          const floatingCard = sourceImg.cloneNode();
          const centerWidth = Math.min(sourceRect.width * 0.82, 180);
          const centerHeight = centerWidth * 1.5;
          const centerLeft = (window.innerWidth - centerWidth) / 2;
          const centerTop = Math.max(72, (window.innerHeight - centerHeight) / 2 - 24);

          floatingCard.className = "floating-chance-card";
          floatingCard.style.left = `${sourceRect.left}px`;
          floatingCard.style.top = `${sourceRect.top}px`;
          floatingCard.style.width = `${sourceRect.width}px`;
          floatingCard.style.height = `${sourceRect.height}px`;
          document.body.appendChild(floatingCard);

          sourceImg.style.visibility = "hidden";
          target.classList.add("receiving");
          playerCard.classList.add("receiving-chance");

          const flight = floatingCard.animate([
            {
              left: `${sourceRect.left}px`,
              top: `${sourceRect.top}px`,
              width: `${sourceRect.width}px`,
              height: `${sourceRect.height}px`,
              borderRadius: "8px",
              opacity: 1,
              transform: "rotate(0deg)"
            },
            {
              left: `${centerLeft}px`,
              top: `${centerTop}px`,
              width: `${centerWidth}px`,
              height: `${centerHeight}px`,
              borderRadius: "10px",
              opacity: 1,
              transform: "rotate(-2deg) scale(1)",
              offset: 0.1
            },
            {
              left: `${centerLeft}px`,
              top: `${centerTop}px`,
              width: `${centerWidth}px`,
              height: `${centerHeight}px`,
              borderRadius: "10px",
              opacity: 1,
              transform: "rotate(1.5deg) scale(1.08)",
              filter: "drop-shadow(0 0 28px rgba(228, 224, 154, 1)) drop-shadow(0 0 48px rgba(80, 211, 223, 0.7))",
              offset: 0.34
            },
            {
              left: `${centerLeft}px`,
              top: `${centerTop}px`,
              width: `${centerWidth}px`,
              height: `${centerHeight}px`,
              borderRadius: "10px",
              opacity: 1,
              transform: "rotate(-1deg) scale(1)",
              filter: "drop-shadow(0 0 18px rgba(228, 224, 154, 0.9)) drop-shadow(0 14px 22px rgba(0, 72, 112, 0.24))",
              offset: 0.58
            },
            {
              left: `${centerLeft}px`,
              top: `${centerTop}px`,
              width: `${centerWidth}px`,
              height: `${centerHeight}px`,
              borderRadius: "10px",
              opacity: 1,
              transform: "rotate(1deg) scale(1.06)",
              filter: "drop-shadow(0 0 26px rgba(228, 224, 154, 0.95)) drop-shadow(0 0 44px rgba(80, 211, 223, 0.62))",
              offset: 0.84
            },
            {
              left: `${targetRect.left - 3}px`,
              top: `${targetRect.top - 3}px`,
              width: `${targetRect.width + 6}px`,
              height: `${targetRect.height + 6}px`,
              borderRadius: "50%",
              opacity: 0.88,
              transform: "rotate(10deg)",
              offset: 0.92
            },
            {
              left: `${targetRect.left}px`,
              top: `${targetRect.top}px`,
              width: `${targetRect.width}px`,
              height: `${targetRect.height}px`,
              borderRadius: "50%",
              opacity: 0,
              transform: "rotate(0deg)"
            }
          ], {
            duration: 4850,
            easing: "cubic-bezier(0.2, 0.82, 0.24, 1)",
            fill: "forwards"
          });

          flight.onfinish = () => {
            floatingCard.remove();
            drawnCard.remove();
            target.classList.remove("receiving");
            playerCard.classList.remove("receiving-chance");
            resolve();
          };
        });
      }

      updateSequenceDisplay(sequence, animateReveal = false) {
        let sequenceDisplay = document.querySelector(".sequence-display");
        if (!sequenceDisplay) {
          sequenceDisplay = document.createElement("div");
          sequenceDisplay.className = "sequence-display";
          document.querySelector(".game-board").appendChild(sequenceDisplay);
        }

        sequenceDisplay.innerHTML = `
          <div class="sequence-panel">
            <button class="hide-sequence-btn">Hide</button>
            <div class="sequence-cards">
              ${sequence.map((card, index) => `
                <div class="sequence-card${animateReveal ? " reveal-card" : ""}" style="--delay: ${(sequence.length - index - 1) * 0.08}s">
                  <img src="${card.imagePath}" alt="${card.label}">
                </div>
              `).join("")}
            </div>
          </div>
        `;

        sequenceDisplay.onclick = () => {
          sequenceDisplay.classList.remove("active");
        };

        const sequencePanel = sequenceDisplay.querySelector(".sequence-panel");
        if (sequencePanel) {
          sequencePanel.onclick = (event) => {
            event.stopPropagation();
          };
        }

        sequenceDisplay.querySelector(".hide-sequence-btn").onclick = () => {
          sequenceDisplay.classList.remove("active");

      updateMemoryStrip(sequence, visibleCount, receivingIndex = -1) {
        const strip = document.querySelector(".memory-strip");
        if (!strip) {
          return;
        }

        const cards = sequence.slice(0, visibleCount);
        strip.innerHTML = cards.map((card, index) => (
          `<span class="memory-card${index === receivingIndex ? " receiving" : ""}" style="--i: ${index}" title="${index + 1}" aria-label="Remembered card ${index + 1}"></span>`
        )).join("");
        strip.setAttribute("aria-label", `${cards.length} remembered card${cards.length === 1 ? "" : "s"}`);
      }

      animateDisplayedCardToMemory(sequence, visibleCount) {
        const drawnCard = document.querySelector("#cardDisplay .drawn-card");
        const sourceImg = drawnCard?.querySelector("img");
        const targetIndex = visibleCount - 1;

        if (!sourceImg || targetIndex < 0) {
          this.updateMemoryStrip(sequence, visibleCount);
          return Promise.resolve();
        }

        this.updateMemoryStrip(sequence, visibleCount, targetIndex);

        const target = document.querySelectorAll(".memory-card")[targetIndex];
        if (!target) {
          this.updateMemoryStrip(sequence, visibleCount);
          return Promise.resolve();
        }

        const sourceRect = sourceImg.getBoundingClientRect();
        const targetRect = target.getBoundingClientRect();
        const floatingCard = document.createElement("div");
        const floatingInner = document.createElement("div");
        const frontFace = sourceImg.cloneNode();
        const backFace = sourceImg.cloneNode();

        floatingCard.className = "memory-floater";
        floatingInner.className = "memory-floater-inner";
        frontFace.className = "memory-floater-face memory-floater-front";
        backFace.className = "memory-floater-face memory-floater-back";
        backFace.src = deckBack;
        floatingInner.append(frontFace, backFace);
        floatingCard.appendChild(floatingInner);
        floatingCard.style.left = `${sourceRect.left}px`;
        floatingCard.style.top = `${sourceRect.top}px`;
        floatingCard.style.width = `${sourceRect.width}px`;
        floatingCard.style.height = `${sourceRect.height}px`;
        document.body.appendChild(floatingCard);
        sourceImg.style.visibility = "hidden";

        return new Promise((resolve) => {
          const liftTop = Math.min(sourceRect.top, targetRect.top) - Math.min(90, window.innerHeight * 0.14);
          const midLeft = sourceRect.left + (targetRect.left - sourceRect.left) * 0.48;
          const midTop = liftTop;
          const midWidth = sourceRect.width * 0.78;
          const midHeight = sourceRect.height * 0.78;
          const pathAnimation = floatingCard.animate([
            {
              left: `${sourceRect.left}px`,
              top: `${sourceRect.top}px`,
              width: `${sourceRect.width}px`,
              height: `${sourceRect.height}px`,
              transform: "rotate(0deg)"
            },
            {
              left: `${midLeft}px`,
              top: `${midTop}px`,
              width: `${midWidth}px`,
              height: `${midHeight}px`,
              transform: "rotate(-4deg)",
              offset: 0.46
            },
            {
              left: `${targetRect.left + 8}px`,
              top: `${targetRect.top - 6}px`,
              width: `${targetRect.width * 1.14}px`,
              height: `${targetRect.height * 1.14}px`,
              transform: `rotate(${(targetIndex - 4) * 1.6}deg)`,
              offset: 0.82
            },
            {
              left: `${targetRect.left}px`,
              top: `${targetRect.top}px`,
              width: `${targetRect.width}px`,
              height: `${targetRect.height}px`,
              transform: `rotate(${(targetIndex - 4) * 1.6}deg)`
            }
          ], {
            duration: 980,
            easing: "cubic-bezier(0.18, 0.82, 0.24, 1)",
            fill: "forwards"
          });

          floatingInner.animate([
            { transform: "rotateY(0deg)" },
            { transform: "rotateY(0deg)", offset: 0.34 },
            { transform: "rotateY(180deg)", offset: 0.74 },
            { transform: "rotateY(180deg)" }
          ], {
            duration: 980,
            easing: "cubic-bezier(0.34, 0.02, 0.2, 1)",
            fill: "forwards"
          });

          pathAnimation.onfinish = () => {
            floatingCard.remove();
            sourceImg.style.visibility = "";
            this.updateMemoryStrip(sequence, visibleCount);
            resolve();
          };
        });
      }

      updatePlayerDisplay(players, currentPlayerIndex) {
        players.forEach((player, index) => {
          const playerCard = document.getElementById(`player${index + 1}Card`);
          playerCard.querySelector(".player-name").textContent = player.name;
          playerCard.querySelector(".player-score span").textContent = player.score;
          playerCard.classList.toggle("active", currentPlayerIndex === index);
        });
        this.updateTurnBeam(currentPlayerIndex);
      }

      updateTurnBeam(currentPlayerIndex) {
        const playersContainer = document.querySelector(".players-container");
        const beam = document.querySelector(".turn-beam");
        const playerCard = document.getElementById(`player${currentPlayerIndex + 1}Card`);

        if (!playersContainer || !beam || !playerCard) {
          return;
        }

        const containerRect = playersContainer.getBoundingClientRect();
        const cardRect = playerCard.getBoundingClientRect();
        const nextPosition = {
          left: cardRect.left - containerRect.left - 14,
          top: cardRect.top - containerRect.top - 10,
          width: cardRect.width + 28,
          height: cardRect.height + 20
        };

        beam.classList.add("moving");
        beam.style.left = `${nextPosition.left}px`;
        beam.style.top = `${nextPosition.top}px`;
        beam.style.width = `${nextPosition.width}px`;
        beam.style.height = `${nextPosition.height}px`;

        window.clearTimeout(this.turnBeamTimer);
        this.turnBeamTimer = window.setTimeout(() => {
          beam.classList.add("ready");
          beam.classList.remove("moving");
        }, 580);
      }

      updateCardDisplay() {
        document.getElementById("cardDisplay").innerHTML = "";
      }

      updateSecondChanceDisplay(playerIndex) {
        const playerCard = document.getElementById(`player${playerIndex + 1}Card`);
        const icons = playerCard.querySelectorAll(".second-chance-icon");
        const player = this.game.players[playerIndex];

        icons.forEach((icon, i) => {
          icon.classList.toggle("active", i < player.secondChanceCards.length);
        });
      }

      updateUseChanceButton(playerIndex) {
        const playerCard = document.getElementById(`player${playerIndex + 1}Card`);
        const button = playerCard.querySelector(".use-chance-btn");
        const hasChanceCards = this.game.players[playerIndex].secondChanceCards.length > 0;

        button.classList.toggle("active", hasChanceCards);
        button.disabled = !hasChanceCards;
      }
    }

    class Game {
      constructor() {
        this.playedCards = [];
        this.roundSequence = [];
        this.isEditing = false;
        this.players = [new Player("Player 1"), new Player("Player 2")];
        this.currentPlayerIndex = 0;
        this.currentCard = null;
        this.nextCard = null;
        this.currentDisplayedCard = null;
        this.memoryCardCount = 0;
        this.isDrawing = false;
        this.roundActive = true;
        this.secondChanceUsed = false;
        this.deckElement = document.querySelector(".deck");
        this.ui = new GameUI(this);
        this.deckManager = new DeckManager();
        this.messageManager = new MessageManager();

        this.applyAssetPaths();
        this.setupCards();
        this.initializeEventHandlers();
        this.initializeGame();
        this.preloadImagesInBackground();
      }

      applyAssetPaths() {
        document.documentElement.style.setProperty("--deck-back", `url("${deckBack}")`);
        const deckBackImage = document.getElementById("deckBackImage");
        const legend = document.getElementById("legendImage");
        deckBackImage.loading = "eager";
        deckBackImage.decoding = "async";
        deckBackImage.fetchPriority = "high";
        deckBackImage.src = deckBack;
        legend.loading = "lazy";
        legend.decoding = "async";
        legend.src = legendImage;
      }

      initializeEventHandlers() {
        this.ui.setupEventListeners(this);
        this.ui.setupDeckInteraction(this);
        this.ui.setupResetButton(this);
        this.ui.setupUseChanceButtons(this);
        this.ui.setupLegendButton();
        this.ui.setupSpacebarListener(this);
      }

      initializeGame() {
        this.ui.updatePlayerDisplay(this.players, this.currentPlayerIndex);
        this.ui.updateSequenceDisplay(this.roundSequence);
        this.ui.updateMemoryStrip(this.roundSequence, this.memoryCardCount);
      }

      setupCards() {
        this.deckManager.reset();
        this.deckManager.createNounCards(nounFiles.map(asset));
        this.deckManager.createChanceCards(chanceFiles.map(asset));
        this.deckManager.shuffleDeck();
      }

      preloadImagesInBackground() {
        const imagePaths = [deckBack, legendImage, ...nounFiles.map(asset), ...chanceFiles.map(asset)];
        imagePaths.forEach((path) => {
          const img = new Image();
          img.decoding = "async";
          img.src = path;
        });
      }

      async drawNewCard() {
        if (this.isDrawing) {
          return;
        }
        this.isDrawing = true;

        if (!this.roundActive) {
          this.endRound();
          this.isDrawing = false;
          return;
        }

        this.currentCard = this.nextCard || this.deckManager.drawCard();

        if (!this.currentCard) {
          this.messageManager.showMessage("You've reached the bottom! Now, work your way back up. Good luck :)", "success", true);
          this.roundActive = false;
          this.isDrawing = false;
          return;
        }

        if (this.currentDisplayedCard?.type === "noun" && this.memoryCardCount < this.roundSequence.length) {
          this.memoryCardCount += 1;
          this.ui.animateDisplayedCardToMemory(this.roundSequence, this.memoryCardCount);
        }

        this.ui.displayDrawnCard(this.currentCard);

        if (this.currentCard.type === "noun") {
          this.roundSequence.push({
            imagePath: this.currentCard.imagePath,
            label: this.currentCard.label,
            type: this.currentCard.type
          });
        }

        this.ui.updateSequenceDisplay(this.roundSequence);
        this.nextCard = this.deckManager.drawCard();
        this.currentDisplayedCard = this.currentCard;

        if (this.currentCard.type === "chance") {
          setTimeout(() => {
            this.assignSecondChanceCard();
          }, 260);
        } else {
          this.currentPlayerIndex = (this.currentPlayerIndex + 1) % this.players.length;
          this.ui.updatePlayerDisplay(this.players, this.currentPlayerIndex);
        }

        this.isDrawing = false;
      }

      async assignSecondChanceCard() {
        const card = this.currentCard;
        card.assigned = true;
        card.used = true;
        this.secondChanceUsed = true;
        this.players[this.currentPlayerIndex].secondChanceCards.push(card);

        this.messageManager.showMessage(`${this.players[this.currentPlayerIndex].name} got a Second Chance card!`, "success");
        await this.ui.animateSecondChanceAbsorb(this.currentPlayerIndex);
        this.ui.updateSecondChanceDisplay(this.currentPlayerIndex);
        this.ui.updateUseChanceButton(this.currentPlayerIndex);
      }

      endRound() {
        document.querySelectorAll(".game-message.persistent").forEach((message) => message.remove());

        this.playedCards = [];
        this.roundSequence = [];
        this.currentCard = null;
        this.nextCard = null;
        this.currentDisplayedCard = null;
        this.memoryCardCount = 0;
        this.secondChanceUsed = false;
        this.roundActive = true;
        this.currentPlayerIndex = 0;
        this.players.forEach((player, index) => {
          player.secondChanceCards = [];
          this.ui.updateSecondChanceDisplay(index);
          this.ui.updateUseChanceButton(index);
        });

        this.setupCards();
        this.ui.updateCardDisplay();
        this.ui.updateSequenceDisplay(this.roundSequence);
        this.ui.updateMemoryStrip(this.roundSequence, this.memoryCardCount);
        this.ui.updatePlayerDisplay(this.players, this.currentPlayerIndex);
        document.querySelector(".sequence-display").classList.remove("active");
      }

      useSecondChance(playerIndex) {
        if (!this.players[playerIndex].secondChanceCards.length) {
          return;
        }

        this.players[playerIndex].secondChanceCards.pop();
        this.messageManager.showMessage(`${this.players[playerIndex].name} used a Second Chance!`, "success");
        this.ui.updateSecondChanceDisplay(playerIndex);
        this.ui.updateUseChanceButton(playerIndex);
      }

      showSequence(forceOpen = false) {
        const sequenceDisplay = document.querySelector(".sequence-display");
        this.ui.updateSequenceDisplay(this.roundSequence, true);
        sequenceDisplay.classList.toggle("active", forceOpen || !sequenceDisplay.classList.contains("active"));
      }

      showMessage(text, type, persistent = false) {
        this.messageManager.showMessage(text, type, persistent);
      }

      restart() {
        document.getElementById("gameOverModal").classList.add("hidden");
        this.players = [new Player("Player 1"), new Player("Player 2")];
        this.endRound();
      }

      resolveChallenge(challengeCorrect) {
        const challenger = this.players[(this.currentPlayerIndex + 1) % 2];
        const challenged = this.players[this.currentPlayerIndex];

        if (challengeCorrect) {
          challenger.score += 1;
          this.messageManager.showMessage(`${challenger.name} wins the challenge!`, "success");
        } else {
          challenged.score += 1;
          this.messageManager.showMessage(`${challenged.name} successfully defends!`, "success");
        }

        this.ui.updatePlayerDisplay(this.players, this.currentPlayerIndex);
        this.endRound();
      }
    }

    window.addEventListener("DOMContentLoaded", () => {
      window.recallGame = new Game();
    });
  </script>
</body>
</html>
