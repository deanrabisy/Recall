<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Re-Call</title>
<style>
:root{--blue:#23879f;--teal:#16b7a7;--cyan:#50d3df;--red:#23879f;--pink:#004870;--gold:#e4e09a;--text:#004870;--bg:#eff8d7;--mint:#dafbe9;--mint2:#bdf6e0}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at top left,#50d3df47,transparent 32rem),linear-gradient(135deg,#eff8d7,#dafbe9 52%,#bdf6e0);color:var(--text);font-family:Arial,Helvetica,sans-serif}.game{width:100%;max-width:1800px;padding:16px;text-align:center}.board{position:relative;min-height:520px;padding:24px 32px 32px;border-radius:16px;background:#fffffff0;border:1px solid #23879f29;box-shadow:0 18px 45px #00487024;backdrop-filter:blur(12px)}.brand-logo{position:absolute;top:10px;left:12px;z-index:2;width:clamp(82px,10.2vw,128px);height:auto;object-fit:contain}button{border:0;border-radius:8px;cursor:pointer;font:inherit;transition:transform .2s,opacity .2s}button:hover:not(:disabled){transform:scale(1.05)}button:disabled{cursor:not-allowed}.reset{position:absolute;top:16px;right:16px;width:40px;height:40px;padding:8px;background:transparent}.reset svg{width:24px;height:24px;fill:var(--text)}.reset:hover{transform:rotate(180deg)}.players{display:flex;justify-content:space-between;gap:24px;padding:0 clamp(8px,8vw,128px);margin-bottom:8px}.player{min-width:200px;padding:16px 24px;border-radius:8px;background:#bdf6e052;border:1px solid #16b7a729;transition:.3s}.player.active{box-shadow:0 0 0 2px #50d3df6b,0 14px 30px #0048701f;transform:translateY(-2px)}.name{margin-bottom:8px;padding:8px;border-radius:4px;font-size:19px;font-weight:700}.player.active .name{background:linear-gradient(135deg,#23879f,#16b7a7);color:#fff}.name:focus,.score span:focus,h2:focus{outline:2px solid var(--blue);background:#50d3df24}.score span{display:inline-block;min-width:32px;padding:4px;border-radius:4px}.chance-icons{display:flex;gap:5px;justify-content:center;margin-top:8px}.chance-dot{width:12px;height:12px;border-radius:50%;background:var(--gold);opacity:.36}.chance-dot.active{opacity:1;box-shadow:0 0 12px #e4e09ad1}.use{width:80%;min-height:35px;margin-top:8px;padding:8px 20px;background:var(--gold);color:var(--text);opacity:.35}.use.active{background:linear-gradient(135deg,#e4e09a,#b2ecd1);opacity:1}.actions{position:relative;display:flex;justify-content:center;margin:-16px 0 8px;padding-top:40px}.legend-btn{position:absolute;top:-8px;left:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;padding:0;border-radius:50%;background:#004870;color:#fff;font-size:19px;font-weight:700;transform:translateX(-50%)}.legend-btn:hover{transform:translateX(-50%) scale(1.1);background:#23879f}.reveal{padding:16px 32px;background:linear-gradient(135deg,#004870,#23879f);color:#fff;font-size:19px}.area{margin:0 0 16px;padding:8px 16px;border-radius:8px;background:linear-gradient(180deg,#fffffff0,#c4f7e56b);border:1px solid #23879f1f;box-shadow:0 10px 26px #00487014}h2{margin:0 auto 16px;padding:8px;border-radius:8px;font-size:29px}.deck-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;align-items:center;min-height:300px;margin:16px auto}.deck,.display,.drawn{width:200px;height:300px}.deck{position:relative;grid-column:2;justify-self:center;cursor:pointer;transition:transform .2s}.deck:before,.deck:after{content:"";position:absolute;inset:0;z-index:-1;background:var(--deck-back) center/contain no-repeat}.deck:before{top:3px;left:3px;filter:brightness(.95);transform:rotate(-2deg)}.deck:after{top:1.5px;left:1.5px;filter:brightness(.97);transform:rotate(-1deg)}.display{grid-column:3;justify-self:center;perspective:1000px}.deck img,.drawn img,.seq-card img,.legend-img{width:100%;height:100%;object-fit:contain}.drawn{display:flex;align-items:center;justify-content:center;opacity:0}.drawn.show{animation:draw .8s cubic-bezier(.4,0,.2,1) forwards;transform-origin:left center}.drawn.celebrate img{animation:glow 2s ease-in-out forwards}.float-card{position:fixed;z-index:1003;pointer-events:none;transform-origin:center;transition:transform .9s cubic-bezier(.2,.9,.25,1),opacity .9s,filter .9s;filter:drop-shadow(0 0 22px #e4e09a) drop-shadow(0 0 44px #50d3dfd9) drop-shadow(0 0 70px #ffffffb3)}.float-card.absorb{opacity:0;filter:drop-shadow(0 0 2px #e4e09a33)}.player.absorb .name{animation:absorb .85s ease}@keyframes draw{0%{opacity:0;transform:translateX(-200px) rotateY(90deg)}to{opacity:1;transform:translateX(0) rotateY(0)}}@keyframes glow{0%{filter:drop-shadow(0 0 0 #e4e09a00);transform:scale(1)}35%{filter:drop-shadow(0 0 28px #e4e09a) drop-shadow(0 0 54px #50d3dfe6) drop-shadow(0 0 82px #ffffffd9);transform:scale(1.07)}70%{filter:drop-shadow(0 0 36px #e4e09a) drop-shadow(0 0 68px #50d3dff2) drop-shadow(0 0 96px #ffffffe6);transform:scale(1.055)}to{filter:drop-shadow(0 0 22px #e4e09a) drop-shadow(0 0 44px #50d3dfd9) drop-shadow(0 0 70px #ffffffb3);transform:scale(1)}}@keyframes absorb{0%{box-shadow:0 0 0 #e4e09a00}35%{box-shadow:0 0 0 8px #e4e09a5c,0 0 28px #e4e09ae6,0 0 46px #50d3df8c}to{box-shadow:0 0 0 #e4e09a00}}.sequence{display:none;margin-top:32px;padding:16px;border-radius:8px;background:#fffffff5;box-shadow:0 2px 4px #0048701a}.sequence.active{display:block}.seq-cards{display:flex;flex-wrap:wrap;gap:16px;align-items:center;justify-content:center}.seq-card{width:100px;height:150px;margin:5px}.hide{margin-bottom:16px;padding:8px 16px;background:#23879f;color:#fff}.overlay{position:fixed;inset:0;z-index:1000;display:none;align-items:center;justify-content:center;background:#004870d9;cursor:pointer}.overlay.active{display:flex}.legend-img{width:auto;max-width:90%;max-height:90vh}.msg{position:fixed;top:50%;left:50%;z-index:1001;max-width:80%;padding:24px 40px;border-radius:8px;background:linear-gradient(135deg,#23879f,#16b7a7);color:#fff;box-shadow:0 18px 45px #00487024;font-size:19px;transform:translate(-50%,-50%);animation:fade 3s forwards}.msg.persistent{animation:none}@keyframes fade{0%{opacity:0}20%,80%{opacity:1}to{opacity:0}}.modal{position:fixed;inset:0;z-index:1002;display:flex;align-items:center;justify-content:center;background:#00487080;opacity:1;pointer-events:auto}.modal.hidden{opacity:0;pointer-events:none}.modal-content{padding:32px;border-radius:16px;background:#fff}@media(max-width:780px){body{align-items:flex-start}.board{padding:72px 12px 20px}.brand-logo{width:95px}.players{flex-direction:column;padding:0}.player{min-width:0}.deck-row{grid-template-columns:1fr 1fr}.empty{display:none}.deck{grid-column:1}.display{grid-column:2}.deck,.display,.drawn{width:min(42vw,160px);height:min(63vw,240px)}}
</style>
</head>
<body>
<div class="game"><div class="board"><img class="brand-logo" src="https://i.ibb.co/C3KcP9cZ/Adaptivelogotrans.png" alt="Adaptive"><button class="reset" title="Reset round" aria-label="Reset round"><svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4z"></path></svg></button><div class="players"><div class="player" id="p0"><div class="name" contenteditable="true">Player 1</div><div class="score">Score: <span contenteditable="true">0</span></div><div class="chance-icons"><span class="chance-dot"></span><span class="chance-dot"></span><span class="chance-dot"></span><span class="chance-dot"></span><span class="chance-dot"></span><span class="chance-dot"></span></div><button class="use" disabled>Use!</button></div><div class="player" id="p1"><div class="name" contenteditable="true">Player 2</div><div class="score">Score: <span contenteditable="true">0</span></div><div class="chance-icons"><span class="chance-dot"></span><span class="chance-dot"></span><span class="chance-dot"></span><span class="chance-dot"></span><span class="chance-dot"></span><span class="chance-dot"></span></div><button class="use" disabled>Use!</button></div></div><div class="actions"><button class="legend-btn">?</button><button class="reveal">Reveal!</button></div><div class="overlay"><img class="legend-img" alt="Game Legend"></div><div class="area"><h2 contenteditable="true">I can't count...</h2><div class="deck-row"><div class="empty"></div><div class="deck" role="button" tabindex="0" aria-label="Draw a card"><img class="deck-img" alt="Card Back"></div><div class="display" aria-live="polite"></div><div class="empty"></div></div></div></div><div id="gameOverModal" class="modal hidden"><div class="modal-content"><h2>Game Over!</h2><p>Winner: <span id="winnerName"></span></p><p>Final Score: <span id="finalScore">0</span></p><button>Play Again</button></div></div></div>
<script>
const U={deck:"https://i.ibb.co/ynBkZt6z/deck-back.png",legend:"https://i.ibb.co/353xcgzt/legendl.png",chance:["https://i.ibb.co/wN6ntb5w/2nd-chance-1.png","https://i.ibb.co/8gW1gJSm/2nd-chance-2.png","https://i.ibb.co/MDz2KKGh/2nd-chance-3.png","https://i.ibb.co/hx2Xc2ps/2nd-chance-4.png","https://i.ibb.co/yFC3Qkjc/2nd-chance-5.png","https://i.ibb.co/7d76Jh3f/2nd-chance-6.png"],noun:["https://i.ibb.co/nqnvYVxV/ncn-basil.png","https://i.ibb.co/TDpH1f3r/ncn-beer.png","https://i.ibb.co/Xxvj9FZS/ncn-bread.png","https://i.ibb.co/FkjGx56z/ncn-butter.png","https://i.ibb.co/rG6cTwQ3/ncn-cereal.png","https://i.ibb.co/PG6G1QmR/ncn-cheese.png","https://i.ibb.co/nNz8MBpx/ncn-coffee.png","https://i.ibb.co/VcCnTPcN/ncn-flour.png","https://i.ibb.co/rK9kBTky/ncn-garlic.png","https://i.ibb.co/qYKGNPcv/ncn-honey.png","https://i.ibb.co/4wwxLfqp/ncn-ice.png","https://i.ibb.co/9mBdLj2R/ncn-juice.png","https://i.ibb.co/mV0hb6GL/ncn-ketchup.png","https://i.ibb.co/5W17zZQC/ncn-mayonnaise.png","https://i.ibb.co/N27bGCjg/ncn-meat.png","https://i.ibb.co/PsxmFJ2z/ncn-milk.png","https://i.ibb.co/35r9bgKs/ncn-mustard.png","https://i.ibb.co/B2BjxKvm/ncn-oil.png","https://i.ibb.co/XxZ5MZgs/ncn-pasta.png","https://i.ibb.co/Y76M3DNm/ncn-pepper.png","https://i.ibb.co/DPwtWxYy/ncn-porridge.png","https://i.ibb.co/60RKYkZ7/ncn-rice.png","https://i.ibb.co/JWNmdrg4/ncn-salt.png","https://i.ibb.co/yr0xFyR/ncn-sauce.png","https://i.ibb.co/RTQbMrfg/ncn-soup.png","https://i.ibb.co/whzrnvkc/ncn-soy.png","https://i.ibb.co/tP36X5wv/ncn-spaghetti.png","https://i.ibb.co/9kkrDNfX/ncn-spinach.png","https://i.ibb.co/YB4cCFjw/ncn-sugar.png","https://i.ibb.co/jvjCJtCx/ncn-tea.png","https://i.ibb.co/p6NNKJ0b/ncn-tofu.png","https://i.ibb.co/n8w6KVfy/ncn-water.png","https://i.ibb.co/tMSTNf7L/ncn-wine.png"]};
class Card{constructor(type,url){this.type=type;this.url=url;this.label=this.labelFrom(url)}labelFrom(url){let n=decodeURIComponent(url.split('/').pop()).replace(/\.[^.]+$/,'');if(n.startsWith('ncn-'))return n.slice(4);if(n.startsWith('2nd-chance'))return'Second Chance';return n}}
class Game{constructor(){this.players=[{name:'Player 1',score:0,chances:[]},{name:'Player 2',score:0,chances:[]}];this.current=0;this.sequence=[];this.editing=false;this.roundActive=true;this.deckEl=document.querySelector('.deck');this.initAssets();this.newDeck();this.bind();this.renderPlayers();this.renderSequence();this.preload()}initAssets(){document.documentElement.style.setProperty('--deck-back',`url("${U.deck}")`);let d=document.querySelector('.deck-img'),l=document.querySelector('.legend-img');d.loading='eager';d.decoding='async';d.fetchPriority='high';d.src=U.deck;l.loading='lazy';l.decoding='async';l.src=U.legend}newDeck(){this.deck=[...U.noun.map(u=>new Card('noun',u)),...U.chance.map(u=>new Card('chance',u))];for(let i=this.deck.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[this.deck[i],this.deck[j]]=[this.deck[j],this.deck[i]]}this.next=null}bind(){document.querySelector('.reset').onclick=()=>{if(confirm('Are you sure you want to reset the current round?')){this.endRound();this.msg('Round reset!')}};document.querySelector('.reveal').onclick=()=>this.showSequence();document.querySelector('.legend-btn').onclick=e=>{e.stopPropagation();document.querySelector('.overlay').classList.add('active')};document.querySelector('.overlay').onclick=()=>document.querySelector('.overlay').classList.remove('active');this.deckEl.onclick=()=>this.draw();this.deckEl.onkeydown=e=>{if(e.key==='Enter')this.draw()};document.querySelectorAll('.use').forEach((b,i)=>b.onclick=()=>{this.showSequence(true);this.useChance(i)});document.querySelectorAll('.name').forEach((el,i)=>el.onblur=()=>{this.players[i].name=el.textContent.trim()||`Player ${i+1}`;this.renderPlayers()});document.querySelectorAll('.score span').forEach((el,i)=>el.onblur=()=>{this.players[i].score=parseInt(el.textContent,10)||0;this.renderPlayers()});document.addEventListener('focusin',e=>{if(e.target.hasAttribute('contenteditable'))this.editing=true});document.addEventListener('focusout',e=>{if(e.target.hasAttribute('contenteditable'))this.editing=false});document.addEventListener('keydown',e=>{if(e.code==='Space'&&!this.editing){e.preventDefault();this.draw()}})}preload(){[U.deck,U.legend,...U.noun,...U.chance].forEach(url=>{let img=new Image;img.decoding='async';img.src=url})}draw(){if(!this.roundActive){this.endRound();return}let card=this.next||this.deck.pop();if(!card){this.msg("You've reached the bottom! Now, work your way back up. Good luck :)",true);this.roundActive=false;return}this.next=this.deck.pop()||null;this.showCard(card);if(card.type==='noun'){this.sequence.push(card);this.renderSequence();this.current=(this.current+1)%2;this.renderPlayers()}else setTimeout(()=>this.assignChance(card),500)}showCard(card){let area=document.querySelector('.display');area.innerHTML='';let div=document.createElement('div'),img=document.createElement('img');div.className='drawn';img.src=card.url;img.alt=card.label;img.decoding='async';div.appendChild(img);area.appendChild(div);requestAnimationFrame(()=>div.classList.add('show'))}async assignChance(card){let i=this.current;this.players[i].chances.push(card);this.msg(`${this.players[i].name} got a Second Chance card!`);await this.animateChance(i);this.renderPlayers()}animateChance(i){let drawn=document.querySelector('.drawn'),img=drawn?.querySelector('img'),player=document.getElementById('p'+i),target=player?.querySelector('.name');if(!drawn||!img||!player||!target)return Promise.resolve();drawn.classList.add('celebrate');return new Promise(resolve=>{setTimeout(()=>{let s=img.getBoundingClientRect(),t=target.getBoundingClientRect(),clone=img.cloneNode(),sx=s.left+s.width/2,sy=s.top+s.height/2,tx=t.left+t.width/2,ty=t.top+t.height/2;clone.className='float-card';clone.style.left=s.left+'px';clone.style.top=s.top+'px';clone.style.width=s.width+'px';clone.style.height=s.height+'px';document.body.appendChild(clone);img.style.visibility='hidden';player.classList.add('absorb');requestAnimationFrame(()=>{clone.classList.add('absorb');clone.style.transform=`translate(${tx-sx}px,${ty-sy}px) scale(.18) rotate(8deg)`});setTimeout(()=>{clone.remove();img.style.visibility='';drawn.classList.remove('celebrate');player.classList.remove('absorb');resolve()},950)},2000)})}useChance(i){if(!this.players[i].chances.length)return;this.players[i].chances.pop();this.msg(`${this.players[i].name} used a Second Chance!`);this.renderPlayers()}renderPlayers(){this.players.forEach((p,i)=>{let el=document.getElementById('p'+i);el.classList.toggle('active',i===this.current);el.querySelector('.name').textContent=p.name;el.querySelector('.score span').textContent=p.score;el.querySelectorAll('.chance-dot').forEach((d,n)=>d.classList.toggle('active',n<p.chances.length));let b=el.querySelector('.use');b.classList.toggle('active',p.chances.length>0);b.disabled=!p.chances.length})}renderSequence(){let seq=document.querySelector('.sequence');if(!seq){seq=document.createElement('div');seq.className='sequence';document.querySelector('.board').appendChild(seq)}seq.innerHTML=`<button class="hide">Hide</button><div class="seq-cards">${this.sequence.map(c=>`<div class="seq-card"><img src="${c.url}" alt="${c.label}" loading="lazy" decoding="async"></div>`).join('')}</div>`;seq.querySelector('.hide').onclick=()=>seq.classList.remove('active')}showSequence(force=false){document.querySelector('.sequence').classList.toggle('active',force||!document.querySelector('.sequence').classList.contains('active'))}endRound(){document.querySelectorAll('.msg.persistent').forEach(m=>m.remove());this.sequence=[];this.current=0;this.roundActive=true;this.players.forEach(p=>p.chances=[]);this.newDeck();document.querySelector('.display').innerHTML='';this.renderSequence();this.renderPlayers();document.querySelector('.sequence').classList.remove('active')}msg(text,persistent=false){document.querySelectorAll('.msg.persistent').forEach(m=>m.remove());let m=document.createElement('div');m.className='msg'+(persistent?' persistent':'');m.textContent=text;document.querySelector('.board').appendChild(m);if(!persistent)setTimeout(()=>m.remove(),2000)}}
addEventListener('DOMContentLoaded',()=>{window.recallGame=new Game});
</script>
</body>
</html>
